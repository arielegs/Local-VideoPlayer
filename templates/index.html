<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; media-src 'self' blob:; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Video Player</title>
    <!-- Force CSS refresh -->
    <link rel="stylesheet" href="/static/style.css?v=14">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h2>Videos</h2>
                <button id="folder-btn" title="Change Video Folder">📁</button>
            </div>
            <div id="video-list" class="video-list">
                <!-- Videos will be populated here -->
            </div>
        </div>
        <div class="main-content">
            <div class="player-container" id="player-container">
                <video id="video-player">
                    Your browser does not support the video tag.
                </video>
                <div class="controls" id="video-controls">
                    <div class="progress-bar-container" id="progress-bar-container">
                        <div class="progress-bar-background"></div>
                        <div class="progress-bar" id="progress-bar"></div>
                        <div class="time-tooltip" id="time-tooltip">0:00</div>
                    </div>
                    <div class="buttons">
                        <button id="play-pause" title="Play/Pause">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
                        </button>
                        
                        <div class="volume-container">
                            <button id="mute-btn" title="Mute">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"/></svg>
                            </button>
                            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" title="Volume">
                        </div>

                        <span id="time-display">0:00 / 0:00</span>
                        
                        <div class="spacer"></div>
                        
                        <button id="fullscreen-btn" title="Fullscreen">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="video-info">
                <h2 id="current-video-title">Select a video to play</h2>
            </div>
        </div>
    </div>

    <!-- Simple modal to change directory -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Settings</h3>
            <label for="video-dir-input">Video Directory Path:</label>
            <input type="text" id="video-dir-input" placeholder="C:/Users/Videos">
            <button id="save-settings">Save</button>
        </div>
    </div>

    <!-- Force JS refresh -->
    <script src="/static/script.js?v=12"></script>
</body>
</html>
