name: Build Electron App

on:
  push:
    # Run on all pushes to branches (for artifacts) AND tags (for releases)
    branches:
      - dev
      - main
    tags:
      - 'v*' # Triggers on tags that start with 'v', e.g., v1.0.0

jobs:
  build:
    # Use a matrix strategy to run jobs on Windows, macOS, and Linux
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install System dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
      
      # Build macOS (.dmg)
      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build Linux (.deb and .AppImage)
      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build Windows (.exe)
      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Keep the ZIP artifacts for branch pushes
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LocalVideoPlayer-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.deb
            dist/*.AppImage
            dist/*.exe
          if-no-files-found: warn